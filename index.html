<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rambam Learning Engine</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .question {
      font-size: 28px;
      margin: 30px 0;
      font-weight: bold;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 600px;
      margin: auto;
    }

    button {
      padding: 15px;
      font-size: 18px;
      cursor: pointer;
    }

    #result {
      margin-top: 25px;
      font-size: 24px;
      font-weight: bold;
    }

    #score {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>Rambam Learning Engine</h1>

<div id="score">
Score: 0 / 0
</div>

<div class="question" id="question">
Loading...
</div>

<div class="answers" id="answers">
</div>

<div id="result"></div>

<script>

let sections = [];
let currentSection = null;
let total = 0;
let correct = 0;

const questionDiv = document.getElementById("question");
const answersDiv = document.getElementById("answers");
const resultDiv = document.getElementById("result");
const scoreDiv = document.getElementById("score");

fetch("data/sections.json")
  .then(r => r.json())
  .then(data => {
      sections = data;
      nextQuestion();
  });

function shuffle(array) {
  return [...array].sort(() => Math.random() - 0.5);
}

function nextQuestion() {

  resultDiv.innerHTML = "";

  currentSection =
    sections[Math.floor(Math.random() * sections.length)];

  questionDiv.innerHTML =
    `Which Sefer contains:<br><br>${currentSection.name}?`;

const allSefarim = [...new Set(sections.map(x => x.sefer))];

let choices = [currentSection.sefer];

while (choices.length < 4) {
  const randomSefer = allSefarim[Math.floor(Math.random() * allSefarim.length)];

  if (!choices.includes(randomSefer)) {
    choices.push(randomSefer);
  }
}

choices = shuffle(choices);

  answersDiv.innerHTML = "";

  choices.forEach(choice => {

    const btn = document.createElement("button");

    btn.innerText = choice;

    btn.onclick = () => {

      total++;

      if(choice === currentSection.sefer) {
        correct++;
        resultDiv.innerHTML = "✅ Correct";
      } else {
        resultDiv.innerHTML =
          `❌ Incorrect<br>Answer: ${currentSection.sefer}`;
      }

      scoreDiv.innerHTML =
        `Score: ${correct} / ${total}`;

      setTimeout(nextQuestion, 1200);
    };

    answersDiv.appendChild(btn);
  });
}

</script>

</body>
</html>
